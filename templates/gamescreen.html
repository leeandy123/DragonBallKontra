<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GameGarage Menu</title>
    <script src="https://unpkg.com/kontra@10.0.2/kontra.min.js"></script>
    <style>

        html, body {
            margin: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: black;
        }

        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
            background: black;
        }

    </style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<script type="module" src="/static/controller.js"></script>
<script type="module" src="/static/fighter.js"></script>
<script>

    const bgMusic = new Audio("/static/DBZ - Perfect Cell Theme Remix 5.mp3");

    bgMusic.loop = true;
    bgMusic.volume = 0.2;

    window.addEventListener("load", () => {

        bgMusic.play().catch(() => {

            document.addEventListener("pointerdown", () => {
                bgMusic.play();
            }, { once: true });

        });

    });

</script>
<script>

    const {
        init,
        GameLoop,
        initKeys,
        initPointer
    } = kontra;

    let { canvas, context } = init('gameCanvas');

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    initKeys();
    initPointer();

    GameLoop({

        update() {
            window.updateFighters?.();
        },

        render() {

            context.clearRect(0,0,canvas.width,canvas.height);

            window.renderFighters?.(context, canvas);
        }

    }).start();

</script>
</body>
</html>
