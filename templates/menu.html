<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GameGarage Menu</title>
    <script src="https://unpkg.com/kontra@10.0.2/kontra.min.js"></script>
    <style>
        canvas {
          display: block;
          margin: 0 auto;
          background: black;
        }
    </style>
</head>
<body>
<canvas id="gameCanvas" width="1000" height="1000"></canvas>
<script type="module" src="/static/controller.js"></script>
<script type="module" src="/static/fighter.js"></script>
<script>

const { init, Text, GameLoop, keyPressed, initKeys, Scene, Sprite, imageAssets, load, initPointer } = kontra;

class SceneManager {
    constructor() {
      this.scenes = {};
      this.current = null;
    }

    add(scene) {

        this.scenes[scene.id] = scene;
        if(this.scenes.length === 1){
            this.current = scene
        }

    }

    setScene(id) {


      if(this.current != null){
        this.current.hide();
      }
      console.log("inside set scene: " + id)

      console.log(JSON.stringify(this.scenes));
      this.current = this.scenes[id];
      this.current.show();

    }

    update(dt=1 / 60) {
      this.current?.update(dt);
    }
    render() {
      //console.log('menuScene.render');
      this.current?.render();
    }
}

let { canvas, context } = init('gameCanvas');
initKeys();
initPointer();

let menuText = Text({ x: 100, y: 50, text: 'Welcome to GameGarage!', font:'24px sans-serif', color:'black' });

load().then(() => {


        // menu scene
        let menuScene = Scene({
        id: 'menu',
            render() {
                context.clearRect(0,0,canvas.width,canvas.height);

                window.renderFighters?.();

                menuText.render();
            },
            update() {
                window.updateFighters?.();
            }
        });



let sceneManager = new SceneManager();
sceneManager.add(menuScene);
sceneManager.setScene('menu');



console.log('Canvas:', canvas, 'Context:', context);
console.log('SceneManager initial:', sceneManager);


GameLoop({
    update(){
        sceneManager.update()
        //console.log(sceneManager.current.id);
    },
    render(){
        sceneManager.render()
    }
}).start();


});

</script>
</body>
</html>
