<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>GameGarage-Controller</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.9.0/nipplejs.min.js"></script>

  <style>
    /* 1. Global Lockout */
    html, body, * {
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      background-color: #1e1e1e;
      font-family: Arial, sans-serif;
      overflow: hidden;
      color: white;
      position: fixed;
      width: 100%;
      height: 100%;
    }

    /* 2. UI Elements */
    #input-display {
      position: fixed;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      padding: 5px 10px;
      background: rgba(0, 0, 0, 0.5);
      z-index: 5;
    }

    #joystick-zone {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 50vw;
      height: calc(100vh - 100px);
      z-index: 1;
    }

    .gamecube-buttons {
      position: fixed;
      bottom: 30px;
      right: 30px;
      width: 160px;
      height: 160px;
      z-index: 2;
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr 1fr;
      gap: 10px;
    }

    .btn-circle {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      border: none;
      font-size: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      contain: strict; /* Performance boost */
    }

    #button-a { background-color: #198754; grid-area: 2 / 2; }
    #button-b { background-color: #dc3545; grid-area: 2 / 1; }
    #button-x { background-color: #0d6efd; grid-area: 1 / 2; }
    #button-y { background-color: #ffc107; color: black; grid-area: 1 / 1; }
  </style>
</head>
<body>

<div id="input-display"><strong>Input:</strong> <span id="input-log">None</span></div>
<div id="joystick-zone"></div>

<div class="gamecube-buttons">
  <button id="button-y" class="btn-circle">Y</button>
  <button id="button-x" class="btn-circle">X</button>
  <button id="button-b" class="btn-circle">B</button>
  <button id="button-a" class="btn-circle">A</button>
</div>

<script>
  const protocol = location.protocol === "https:" ? "wss" : "ws";
  let playerId = localStorage.getItem("playerId") || crypto.randomUUID();
  localStorage.setItem("playerId", playerId);

  const socket = new WebSocket(`${protocol}://${location.host}/ws?id=${playerId}`);

  // Joystick Logic
  const joystick = nipplejs.create({
    zone: document.getElementById('joystick-zone'),
    mode: 'static',
    position: { left: '50%', top: '50%' },
    color: 'blue'
  });

  joystick.on('move', (evt, data) => {
    if (data && data.direction) {
      socket.send(JSON.stringify({ type: 'joystick', playerId, direction: data.direction.angle }));
    }
  });

  joystick.on('end', () => {
    socket.send(JSON.stringify({ type: 'joystick', playerId, direction: null }));
  });

  // Button Logic
  ["button-a", "button-b", "button-x", "button-y"].forEach((id) => {
    const btn = document.getElementById(id);
    if (btn) {
      btn.addEventListener("pointerdown", (e) => {
        e.preventDefault();
        socket.send(JSON.stringify({ type: "button", playerId, button: btn.innerText }));
        btn.style.opacity = "0.5";
      });
      btn.addEventListener("pointerup", () => btn.style.opacity = "1.0");
      btn.addEventListener("pointercancel", () => btn.style.opacity = "1.0");
    }
  });

  /* ANTI-ZOOM GESTURE PROTECTIONS */

  // 1. Block double-tap zoom
  let lastTouchEnd = 0;
  document.addEventListener('touchend', (e) => {
    const now = Date.now();
    if (now - lastTouchEnd <= 300) e.preventDefault();
    lastTouchEnd = now;
  }, false);

  // 2. Block multi-finger zoom gestures (iOS Safari)
  document.addEventListener('gesturestart', (e) => e.preventDefault(), { passive: false });
</script>
</body>
</html>
